services:
  trainer:
    build: .
    ports:
      - "9090:9090"
    volumes:
      - trainer-data:/cache
    environment:
      - H2_PASSWORD=${H2_PASSWORD:?Set H2_PASSWORD in .env}
      - H2_FILE_PASSWORD=${H2_FILE_PASSWORD:?Set H2_FILE_PASSWORD in .env}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  trainer-data:
